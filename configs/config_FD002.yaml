data:
  data_dir: ./CMAPSSData
  subset: FD002
  sequence_length: 30
  rul_cap: 125
  window: 30
  n_conditions: 6
  drop_sensors:
    - s1
    - s5
    - s10
    - s16
    - s18
    - s19

xgboost:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.05
  random_state: 42

lstm:
  hidden_size: 64
  num_layers: 2
  dropout: 0.2
  epochs: 200
  batch_size: 64
  learning_rate: 0.001
  patience: 30

cnn:
  num_filters: 64
  kernel_size: 3
  dropout: 0.2
  epochs: 200
  batch_size: 64
  learning_rate: 0.001
  patience: 30

mlflow:
  tracking_uri: ./mlruns
  experiment_baseline: cmapss_fd002_baseline
  experiment_deep: cmapss_fd002_deep